<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mensaje Enviado | Roberto Meraz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .btn {
            margin-top: 30px;
            padding: 0.8rem 2rem;
            border: 1px solid #e0e0e0;
            color: #e0e0e0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e0e0e0;
            color: #121212;
        }
    </style>
</head>

<body>
    <h1>¡Mensaje enviado! 🚀</h1>
    <p>Gracias por escribirme. Revisaré tu mensaje y te responderé lo más pronto posible.</p>
    <a href="index.html" class="btn">Volver al inicio</a>
</body>

</html>
